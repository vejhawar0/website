<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Privacy & Security Tags -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="referrer" content="no-referrer">
    
    <!-- Content Security Policy (Optional but highly recommended) -->
    <!-- <meta http-equiv="Content-Security-Policy" content="default-src 'self';"> -->

    <title>Secure Web Page</title>
</head>
<body>

    <h1>Secure Homepage</h1>
    <p>This page uses modern headers to maximize user privacy and prevent common exploits.</p>

    <!-- Safe external link example -->
    <a href="https://example.com" target="_blank" rel="noopener noreferrer">Safe External Link</a>

</body>
</html>
